name: Check build, docker, and for broken links

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Test native Ruby/Jekyll build and check for broken links
  build-and-broken-links:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Actions checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build Jekyll site natively
        run: bundle exec jekyll build

      - name: Check for broken links
        run: |
          gem install html-proofer
          htmlproofer ./_site --disable-external --no-check-external-hash --ignore-urls "/\/graph\/#/,/\/TODO\//"

  # Test Dockerfile and site build
  test-docker-ubuntu:
    name: Test Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build

      - name: Build inside Docker
        run: docker compose run -u root laz bundle exec jekyll build

  test-docker-arm64:
    name: Test Docker Build (arm64 / Apple Silicon)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Registers QEMU so the amd64 runner can build/run arm64 images.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # Build the image for arm64 and load it locally so we can run it.
      - name: Build image for arm64
        run: docker buildx build --platform linux/arm64 -t laz:arm64 --load .

      - name: Jekyll build inside arm64 image
        run: docker run --rm -u root laz:arm64 bundle exec jekyll build
